version: 1

AppDir:
  path: ./AppDir

  app_info:
    id: com.linuxmint.webapp-manager
    name: WebApp Manager
    icon: webapp-manager
    version: 1.4.8
    exec: usr/bin/python3
    exec_args: "$APPDIR/usr/lib/webapp-manager/webapp-manager.py $@"

  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse'
      - sourceline: 'deb [arch=amd64] http://packages.linuxmint.com victoria main upstream import backport'
        key_url: 'file:///usr/share/keyrings/linuxmint-keyring.gpg'
    include:
      - python3
      - python3-gi
      - python3-bs4
      - python3-configobj
      - python3-pil
      - python3-setproctitle
      - python3-tldextract
      - python3-gi-cairo
      - gir1.2-xapp-1.0
      - xapp-symbolic-icons
      - xapps-common
      - gir1.2-gtk-3.0
      - librsvg2-common
      - adwaita-icon-theme
      - hicolor-icon-theme
    exclude:
      - dpkg

  after_bundle: |
    cp -r usr/* AppDir/usr/
    cp -r etc/* AppDir/etc/
    
  test:
    ubuntu:
      image: appimagecrafters/tests-env:ubuntu-22.04
      command: "./AppRun --help"

AppImage:
  update-information: None
  sign-key: None
  arch: x86_64
